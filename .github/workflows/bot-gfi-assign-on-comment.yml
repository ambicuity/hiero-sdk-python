name: GFI Assign on /assign

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to mock"
        required: true

  issue_comment:
    types:
      - created

permissions:
  issues: write
  contents: read

jobs:
  gfi-assign:
    # Only run on issue comments (not PR comments) or if manually triggered
    if: github.event.issue.pull_request == null || github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest

    # Prevent race conditions: always wait for the first assignment request to finish processing
    concurrency:
      group: gfi-assign-${{ github.event.issue.number || github.event.inputs.issue_number }}
      cancel-in-progress: false

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Run GFI /assign handler
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd #v8.0.0
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              context.payload = {
                issue: { number: Number(context.payload.inputs.issue_number), pull_request: null },
                comment: { user: { login: 'exploreriii', type: 'User' }, body: '/assign' }
              };
            }
            const script = require('./.github/scripts/bot-gfi-assign-on-comment.js');
            await script({ github, context });
